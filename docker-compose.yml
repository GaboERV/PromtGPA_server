version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: promptgpt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: promptgpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: promptgpt-web
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/promptgpt
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: prod-security-fallback-must-be-replaced-via-env
      API_KEY_COOLDOWN_SECONDS: 60
    depends_on:
      - db
      - redis
    restart: always

volumes:
  postgres_data:
  redis_data:
